
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pip49 개인 서버 안내</title>
    <style>
        :root { --primary-color: #3498db; }
        body {
            margin: 0; font-family: 'Pretendard', sans-serif;
            background: url('https://pip49.github.io/intro/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .main-card {
            background: transparent;
            width: 90%; max-width: 500px; padding: 30px;
            text-align: center;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .status-badge { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; text-shadow: none; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .gallery img { width: 100%; border-radius: 8px; border: 2px solid rgba(255,255,255,0.5); }
        .audio-player { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; margin-top: 15px; }
        audio { width: 100%; }
        .timer-text { color: #ff4d4d; font-weight: bold; font-size: 1.2rem; margin: 15px 0; }
        .btn-retry { margin-top: 20px; padding: 12px 25px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-shadow: none; }
        .off-info { font-size: 0.85rem; color: #eee; margin-top: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card" id="main-content">
    <div id="loading-area">
        <h1 id="loading-title">서버 접속 중...</h1>
        <p>잠시 후 개인 서버로 이동합니다.</p>
        <div style="border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const siteType = urlParams.get('site');

    const serverMap = {
        "default": "http://125.251.58.88:49494/cgi-bin/D.cgi",
        "store2": "http://125.251.58.88:49494/cgi-bin/storefront.cgi?action=detail&id=2",
        "product": "http://125.251.58.88:49494/cgi-bin/product_list.cgi?action=detail&item_id=1001",
        "store3": "http://125.251.58.88:49494/cgi-bin/storefront.cgi?action=detail&id=3",
        "txt": "http://125.251.58.88:49494/img/txt.html", // 끝에 쉼표 추가 완료
        "p002": "http://125.251.58.88:49494/cgi-bin/shop.cgi?id=P002",
        "exam": "http://125.251.58.88:49494/cgi-bin/exam.cgi?id=6",
        "fexam": "http://125.251.58.88:49494/cgi-bin/fexam.cgi?id=7",
        "ffexam": "http://125.251.58.88:49494/cgi-bin/ffexam.cgi?id=8",
        "quiz": "http://125.251.58.88:49494/cgi-bin/quiz_viewer.cgi?id=9"
    };

    const targetUrl = serverMap[siteType] || serverMap["default"];

    // 접속 시도
    window.location.href = targetUrl;

    setTimeout(() => {
        // 사이트 별명을 자동으로 가져와서 메시지에 넣음 (if문 수십 개 쓸 필요 없음)
        const siteLabel = siteType ? siteType : "서버";
        let displayMessage = `[${siteLabel}] 서버가 응답하지 않아 홍보 페이지로 전환되었습니다.`;

        document.getElementById('main-content').innerHTML = `
            <span class="status-badge">서버 점검 중</span>
            <h1>Welcome to pip49</h1>
            <p>${displayMessage}</p>

            <div class="gallery">
                <img src="https://pip49.github.io/intro/1.jpg" alt="S1">
                <img src="https://pip49.github.io/intro/2.jpg" alt="S2">
                <img src="https://pip49.github.io/intro/3.jpg" alt="S3">
            </div>

            <div class="audio-player">
                <p>🎵 미리보기 음원 감상</p>
                <audio controls><source src="https://pip49.github.io/intro/1.mp3" type="audio/mpeg"></audio>
            </div>

            <div class="timer-text">
                <span id="timer">05:00</span> 후 자동으로 다시 접속합니다.
            </div>

            <div class="off-info">🕒 <b>운영 시간:</b> 09:00 ~ 22:00</div>
            <button class="btn-retry" onclick="location.reload()">즉시 다시 시도</button>
        `;

        startTimer();
    }, 3000);

    function startTimer() {
        let timeLeft = 300;
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            if (timerElement) {
                timerElement.innerText = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            }
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = targetUrl;
            }
        }, 1000);
    }
</script>
</body>
</html>
